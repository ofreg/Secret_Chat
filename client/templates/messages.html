<style>
.container {
    display: flex;
    height: 80vh;
}

.sidebar {
    width: 30%;
    border-right: 1px solid #ccc;
    padding: 10px;
}

.chat-area {
    width: 70%;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

.messages {
    flex: 1;
    border: 1px solid #ccc;
    overflow-y: auto;
    margin-bottom: 10px;
    padding: 5px;
}
</style>
<script src="/static/js/messages.js"></script>
<div class="container">

    <div class="sidebar">
        <h3>Ваші чати</h3>

        {% if chats %}
            <ul id="chatList">
            {% for chat in chats %}
                <li>
                    <a href="/messages?chat_id={{ chat.id }}">
                        Чат {{ chat.id }}
                    </a>
                </li>
            {% endfor %}
            </ul>
        {% else %}
            <p>Чатів поки немає</p>
        {% endif %}

        <hr>

        <h4>Пошук користувача</h4>
        <input id="searchInput" placeholder="Введіть email">
        <div id="searchResults"></div>
    </div>

    <div class="chat-area">

        {% if request.query_params.get("chat_id") %}
            <div class="messages" id="chat"></div>

            <div>
                <input id="messageInput" placeholder="Повідомлення">
                <button onclick="sendMessage()">Надіслати</button>
            </div>
        {% else %}
            <p>Оберіть чат або знайдіть користувача</p>
        {% endif %}

    </div>

</div>
