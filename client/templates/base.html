<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Chat{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="14" fill="%23163447"/%3E%3Cpath d="M16 20c0-4.4 3.6-8 8-8h16c4.4 0 8 3.6 8 8v12c0 4.4-3.6 8-8 8H29l-9 8v-8h-4z" fill="%23f8fafc"/%3E%3C/svg%3E'>
</head>
<body>

<header class="main-header">
    <nav class="nav">

        <a href="/" class="logo">💬 Chat</a>

        <div class="nav-links">

            <form method="get" action="/register" class="nav-form">
                <button type="submit" class="nav-btn">Реєстрація</button>
            </form>

            <form method="get" action="/login" class="nav-form">
                <button type="submit" class="nav-btn">Логін</button>
            </form>

            <form method="get" action="/messages" class="nav-form">
                <button type="submit" class="nav-btn">Повідомлення</button>
            </form>

            <form method="get" action="/profile" class="nav-form">
                <button type="submit" class="nav-btn">Профіль</button>
            </form>

            <form method="post" action="/logout" class="nav-form">
                <button type="submit" class="nav-btn logout">Вихід</button>
            </form>

        </div>

    </nav>
</header>

<main class="content">
    {% block content %}{% endblock %}
</main>

</body>
</html>
