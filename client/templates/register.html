{% extends "base.html" %}

{% block title %}Реєстрація{% endblock %}

{% block content %}
<div class="auth-wrap">
    <section class="auth-card accent-card">
        <h1 class="auth-title">Створити акаунт</h1>
        <p class="auth-subtitle">
            Зареєструйтесь, щоб отримати власний профіль, аватар, захищені чати та перевірку співрозмовника.
        </p>

        <form method="post" class="form-stack">
            <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
            <label class="form-label">
                Email
                <input
                    class="text-input"
                    name="email"
                    type="email"
                    required
                    value="{{ email or '' }}"
                    autocomplete="email"
                >
            </label>

            <label class="form-label">
                Пароль
                <input
                    class="text-input"
                    name="password"
                    type="password"
                    required
                    autocomplete="new-password"
                >
            </label>

            {% if error %}
                <p class="error-text">{{ error }}</p>
            {% endif %}

            <button type="submit" class="primary-btn auth-submit">Зареєструватися</button>
        </form>

        <div class="auth-links">
            <a class="text-link" href="/login">Уже є акаунт?</a>
        </div>
    </section>
</div>
{% endblock %}
